{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>{{ blogpost.title }}</h1>
    {% if blogpost.preview %}
        <img src="{{ blogpost.preview.url }}" class="img-fluid my-3">
    {% endif %}
    <p>{{ blogpost.content }}</p>
    <p><strong>Просмотров:</strong> {{ blogpost.views }}</p>
    <a href="{% url 'blog:blog_update' blogpost.pk %}" class="btn btn-primary">Редактировать</a>
    <a href="{% url 'blog:blog_delete' blogpost.pk %}" class="btn btn-danger">Удалить</a>
</div>
{% endblock %}

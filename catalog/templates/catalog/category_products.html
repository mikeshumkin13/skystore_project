{% extends "base.html" %}
{% block content %}
  <h1>Товары категории: {{ category.name }}</h1>

  {% for product in products %}
    <div>
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
      <p><strong>{{ product.price }} ₽</strong></p>
      <a href="{% url 'catalog:product_detail' product.pk %}">Подробнее</a>
    </div>
  {% empty %}
    <p>Нет активных товаров в этой категории.</p>
  {% endfor %}
{% endblock %}

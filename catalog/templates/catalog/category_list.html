{% extends "base.html" %}

{% block content %}
  <h1>Категории</h1>
  <ul>
    {% for category in categories %}
      <li>
        <a href="{% url 'catalog:products_by_category' category.slug %}">
          {{ category.name }}
        </a>
      </li>
    {% empty %}
      <li>Категорий пока нет.</li>
    {% endfor %}
  </ul>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>{% if object %}Редактировать{% else %}Создать{% endif %} статью</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Сохранить</button>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
  <h1>{{ post.title }}</h1>
  {% if post.preview %}
    <img src="{{ post.preview.url }}" class="img-fluid mb-3" alt="Превью">
  {% endif %}
  <p>{{ post.content }}</p>
  <p><strong>Просмотров:</strong> {{ post.views_count }}</p>
  <a href="{% url 'blog:blog_update' post.pk %}" class="btn btn-warning">Редактировать</a>
  <a href="{% url 'blog:blog_delete' post.pk %}" class="btn btn-danger">Удалить</a>
{% endblock %}

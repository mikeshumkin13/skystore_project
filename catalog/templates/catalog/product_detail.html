{% extends "base.html" %}

{% block content %}
  <h1>{{ product.name }}</h1>
  <p>{{ product.description }}</p>
  <p><strong>Цена:</strong> {{ product.price }} ₽</p>
  <p><strong>Активен:</strong> {{ product.is_active|yesno:"Да,Нет" }}</p>
  <a href="{% url 'catalog:product_update' product.pk %}" class="btn btn-primary">Редактировать</a>
  <a href="{% url 'catalog:product_delete' product.pk %}" class="btn btn-danger">Удалить</a>
  <br><br>
  <a href="{% url 'catalog:product_list' %}">← Назад к списку</a>
{% endblock %}

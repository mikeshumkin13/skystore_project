{% extends "base.html" %}

{% block content %}
  <h1>{% if object %}Редактировать{% else %}Добавить{% endif %} продукт</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
  </form>
  <br>
  <a href="{% url 'catalog:product_list' %}">← Назад</a>
{% endblock %}
